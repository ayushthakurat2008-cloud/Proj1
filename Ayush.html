<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #c9d1d9;
        }
        
        .container {
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 28px;
            color: #f0f6fc;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #8b949e;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
            color: #f0f6fc;
        }
        
        input[type="text"],
        input[type="email"],
        input[type="password"],
        select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #30363d;
            border-radius: 6px;
            background-color: #0d1117;
            color: #c9d1d9;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        
        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus,
        select:focus {
            outline: none;
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
        }
        
        select {
            cursor: pointer;
            padding-right: 30px;
            background-image: url("data:image/svg+xml; charset=UTF-8,%3csvg viewBox='0 0 16 16' fill='none' xmlns='http://www.w3.org/2000/svg'%3e%3cpath d='M4.5 5.5L8 9l3.5-3.5' stroke='%2358a6ff' stroke-width='2' stroke-linejoin='round'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 8px center;
            background-size: 16px;
            padding-right: 32px;
            appearance: none;
        }
        
        option {
            background-color: #161b22;
            color: #c9d1d9;
        }
        
        .form-group-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        
        input[type="checkbox"] {
            margin-right: 8px;
            cursor: pointer;
            width: 18px;
            height: 18px;
            accent-color: #58a6ff;
        }
        
        .checkbox-label {
            margin: 0;
            font-size: 12px;
            color: #8b949e;
            cursor: pointer;
        }
        
        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: #238636;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }
        
        .login-btn:hover {
            background-color: #2ea043;
        }
        
        .login-btn:active {
            background-color: #238636;
        }
        
        .footer-links {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
        }
        
        .footer-links a {
            color: #58a6ff;
            text-decoration: none;
            margin: 0 5px;
        }
        
        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Sign In</h1>
            <p>Welcome to GitHub</p>
        </div>
        
        <form id="loginForm">
            <!-- Username/Email -->
            <div class="form-group">
                <label for="username">Username or Email Address</label>
                <input type="email" id="username" name="username" placeholder="Enter your email" required>
            </div>
            
            <!-- Password -->
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            
            <!-- Authentication Method -->
            <div class="form-group">
                <label for="authMethod">Authentication Method</label>
                <select id="authMethod" name="authMethod" required>
                    <option value="">Select Authentication Method</option>
                    <option value="password">Password</option>
                    <option value="2fa">Two-Factor Authentication</option>
                    <option value="sso">Single Sign-On (SSO)</option>
                    <option value="webauthn">WebAuthn/Security Key</option>
                </select>
            </div>
            
            <!-- Account Type -->
            <div class="form-group">
                <label for="accountType">Account Type</label>
                <select id="accountType" name="accountType" required>
                    <option value="">Select Account Type</option>
                    <option value="personal">Personal Account</option>
                    <option value="organization">Organization</option>
                    <option value="enterprise">Enterprise</option>
                </select>
            </div>
            
            <!-- Language Preference -->
            <div class="form-group">
                <label for="language">Preferred Language</label>
                <select id="language" name="language">
                    <option value="en">English</option>
                    <option value="es">Spanish</option>
                    <option value="fr">French</option>
                    <option value="de">German</option>
                    <option value="zh">Chinese</option>
                    <option value="ja">Japanese</option>
                    <option value="hi">Hindi</option>
                </select>
            </div>
            
            <!-- Remember Me -->
            <div class="checkbox-group">
                <input type="checkbox" id="rememberMe" name="rememberMe">
                <label for="rememberMe" class="checkbox-label">Keep me signed in</label>
            </div>
            
            <!-- Sign In Button -->
            <button type="submit" class="login-btn">Sign In</button>
        </form>
        
        <!-- Footer Links -->
        <div class="footer-links">
            <a href="#forgot">Forgot Password?</a> | 
            <a href="#signup">Create Account</a> | 
            <a href="#help">Need Help?</a>
        </div>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const authMethod = document.getElementById('authMethod').value;
            const accountType = document.getElementById('accountType').value;
            
            if (!username || !password || !authMethod || !accountType) {
                alert('Please fill in all required fields!');
                return;
            }
            
            alert(`Login attempt for:\nEmail: ${username}\nAuth Method: ${authMethod}\nAccount Type: ${accountType}`);
        });
    </script>
</body>
</html>
